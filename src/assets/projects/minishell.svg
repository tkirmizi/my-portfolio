<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120609"/>
      <stop offset="100%" stop-color="#44101a"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="120" y="170" width="1040" height="390" rx="18" fill="none" stroke="#ff6d84" stroke-width="2.5" opacity="0.9"/>
  <g fill="#ffd8df" font-family="monospace" font-size="26" opacity="0.92">
    <text x="160" y="250">$ export PATH=/usr/local/bin:$PATH</text>
    <text x="160" y="300">$ cat infile | grep error &gt; out.txt</text>
    <text x="160" y="350">$ echo $? </text>
    <text x="160" y="400">$ ./minishell</text>
    <text x="160" y="450">minishell$ ls -la | wc -l</text>
    <text x="160" y="500">42</text>
  </g>
  <text x="84" y="104" fill="#ffe9ed" font-size="66" font-family="Space Grotesk, Arial, sans-serif" font-weight="700">Minishell</text>
  <text x="86" y="148" fill="#ff9faf" font-size="24" font-family="Space Grotesk, Arial, sans-serif">Parser · Pipes · Redirection · Process Control</text>
</svg>
