<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#130609"/>
      <stop offset="100%" stop-color="#43101a"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="94" y="176" width="1092" height="394" rx="18" fill="none" stroke="#ff6b83" stroke-width="2" opacity="0.85"/>
  <g fill="#ffd8df" font-family="monospace" font-size="25" opacity="0.9">
    <text x="126" y="236">char *get_next_line(int fd) {</text>
    <text x="126" y="280">  while (!has_newline(buffer)) {</text>
    <text x="126" y="324">    bytes = read(fd, chunk, BUFFER_SIZE);</text>
    <text x="126" y="368">    if (bytes &lt;= 0) break;</text>
    <text x="126" y="412">    append(buffer, chunk, bytes);</text>
    <text x="126" y="456">  }</text>
    <text x="126" y="500">  return extract_line(buffer);</text>
    <text x="126" y="544">}</text>
  </g>
  <text x="86" y="104" fill="#ffe8ec" font-size="64" font-family="Space Grotesk, Arial, sans-serif" font-weight="700">Get-Next-Line</text>
  <text x="88" y="148" fill="#ff9faf" font-size="24" font-family="Space Grotesk, Arial, sans-serif">File Descriptor · Buffered Read · Memory Safety</text>
</svg>
